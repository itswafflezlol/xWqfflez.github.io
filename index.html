<!DOCTYPE html>
<html lang="en">
<head>
<title>xWqfflez Minecraft Network Manager</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="wafflez — Minecraft Network Manager & Systems Manager">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#080810;
--bg2:#0d0d1a;
--glass:rgba(255,255,255,0.04);
--glass-border:rgba(255,255,255,0.08);
--glass-hover:rgba(255,255,255,0.08);
--text:#f0f0f8;
--text2:#9090b0;
--text3:#5a5a7a;
--gold:#e8c840;
--gold2:#f0a020;
--gold-glow:rgba(232,200,64,0.18);
--silver:#c8cce8;
--silver2:#8890b0;
--white:#ffffff;
--accent:#7c6aff;
--accent2:#4dd6ff;
--green:#22d88a;
--card-r:18px;
--nav-h:64px;
}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}

.ios-bg{
position:fixed;inset:0;z-index:0;overflow:hidden;
background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(100,60,255,0.22) 0%,transparent 60%),
radial-gradient(ellipse 60% 50% at 80% 80%,rgba(232,200,64,0.12) 0%,transparent 55%),
radial-gradient(ellipse 50% 40% at 50% 50%,rgba(77,214,255,0.07) 0%,transparent 60%),
#080810;
}
.ios-grid{
position:absolute;inset:0;
background-image:
linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
background-size:60px 60px;
mask-image:radial-gradient(ellipse 100% 100% at 50% 0%,black 0%,transparent 80%);
}
.ios-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
.ios-orb-1{width:500px;height:500px;top:-100px;right:-80px;background:radial-gradient(circle,rgba(124,106,255,0.28),transparent 70%);animation:drift1 18s ease-in-out infinite;}
.ios-orb-2{width:400px;height:400px;bottom:-100px;left:-80px;background:radial-gradient(circle,rgba(232,200,64,0.18),transparent 70%);animation:drift2 22s ease-in-out infinite;}
.ios-orb-3{width:350px;height:350px;top:40%;right:10%;background:radial-gradient(circle,rgba(77,214,255,0.12),transparent 70%);animation:drift1 28s ease-in-out infinite reverse;}
.ios-noise{position:absolute;inset:0;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px 200px;}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(40px,-60px) scale(1.05);}66%{transform:translate(-30px,40px) scale(0.95);}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-50px,-40px) scale(1.08);}}

.page{position:relative;z-index:1;}
.container{max-width:1160px;margin:0 auto;padding:0 40px;}

.site-nav{
position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);
display:flex;align-items:center;
background:rgba(8,8,16,0.75);
backdrop-filter:blur(28px) saturate(160%);
-webkit-backdrop-filter:blur(28px) saturate(160%);
border-bottom:1px solid rgba(255,255,255,0.07);
}
.nav-inner{max-width:1160px;margin:0 auto;padding:0 40px;width:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:-0.02em;}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold2),var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#1a1400;}
.brand-name{background:linear-gradient(120deg,var(--white) 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-link{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:10px;text-decoration:none;font-size:0.88rem;font-weight:600;color:var(--text2);transition:all 0.2s;border:1px solid transparent;cursor:pointer;background:none;font-family:'Outfit',sans-serif;}
.nav-link:hover{color:var(--text);background:var(--glass);border-color:var(--glass-border);}
.nav-link.active{color:var(--gold);background:rgba(232,200,64,0.07);border-color:rgba(232,200,64,0.18);}
.nav-link i{font-size:0.8rem;}
.nav-cta{padding:8px 20px;background:linear-gradient(135deg,var(--gold2),var(--gold));border-radius:10px;color:#1a1200;font-weight:700;font-size:0.88rem;text-decoration:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity 0.2s;}
.nav-cta:hover{opacity:0.88;}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;}
.hamburger span{width:22px;height:2px;background:var(--text2);border-radius:2px;transition:all 0.3s;display:block;}
.mobile-menu{display:none;position:absolute;top:var(--nav-h);left:0;right:0;background:rgba(8,8,16,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:12px 20px 18px;flex-direction:column;gap:4px;}
.mobile-menu.open{display:flex;}

.section{display:none;padding-top:var(--nav-h);}
.section.active{display:block;}

.hero{padding:100px 0 80px;text-align:center;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--glass);border:1px solid var(--glass-border);border-radius:50px;font-size:0.78rem;color:var(--text2);margin-bottom:28px;font-family:'JetBrains Mono',monospace;}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(34,216,138,0.6);}
.hero-name{font-family:'Outfit',sans-serif;font-size:6rem;font-weight:900;letter-spacing:-0.04em;line-height:1;margin-bottom:20px;}
.hero-name .w{background:linear-gradient(120deg,var(--white),var(--silver));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-name .g{background:linear-gradient(120deg,var(--gold2),var(--gold),#fff5a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:1.15rem;color:var(--text2);max-width:500px;margin:0 auto 40px;line-height:1.75;}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-primary{padding:14px 32px;background:linear-gradient(135deg,var(--gold2),var(--gold));border-radius:12px;color:#1a1200;font-weight:700;font-size:0.95rem;text-decoration:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(232,200,64,0.3);}
.btn-ghost{padding:14px 32px;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;color:var(--text);font-weight:600;font-size:0.95rem;text-decoration:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;}
.btn-ghost:hover{background:var(--glass-hover);border-color:rgba(255,255,255,0.16);transform:translateY(-2px);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:700px;margin:60px auto 0;}
.stat-card{padding:28px 24px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--card-r);text-align:center;position:relative;overflow:hidden;backdrop-filter:blur(12px);}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,200,64,0.04),transparent);pointer-events:none;}
.stat-num{font-family:'Outfit',sans-serif;font-size:2.4rem;font-weight:900;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-size:0.82rem;color:var(--text2);margin-top:6px;font-family:'JetBrains Mono',monospace;}

.section-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.eyebrow-line{height:1px;width:32px;background:linear-gradient(90deg,var(--gold),transparent);}
.eyebrow-text{font-size:0.78rem;color:var(--gold);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;}
.section-h{font-family:'Outfit',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:-0.02em;line-height:1.1;margin-bottom:14px;}
.section-h .accent{background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.section-desc{font-size:1rem;color:var(--text2);line-height:1.75;max-width:560px;}

.glass-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--card-r);backdrop-filter:blur(16px);}
.glass-card:hover{border-color:rgba(255,255,255,0.14);background:var(--glass-hover);}

.home-about{padding:80px 0;}
.home-about-inner{display:grid;grid-template-columns:1.2fr 1fr;gap:80px;align-items:center;}
.about-copy p{font-size:1.05rem;color:var(--text2);line-height:1.85;margin-bottom:18px;}
.about-copy p:last-child{margin-bottom:0;}
.about-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px;}
.pill{padding:7px 16px;background:rgba(232,200,64,0.07);border:1px solid rgba(232,200,64,0.18);border-radius:50px;font-size:0.82rem;color:var(--gold);font-family:'JetBrains Mono',monospace;}
.about-visual{display:flex;flex-direction:column;gap:12px;}
.status-row{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;}
.s-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.s-dot.g{background:var(--green);box-shadow:0 0 8px rgba(34,216,138,0.5);}
.s-dot.o{background:var(--gold2);}
.s-dot.b{background:#7289DA;}
.s-dot.gold{background:var(--gold);}
.s-label{font-size:0.78rem;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.s-val{font-size:0.92rem;font-weight:600;color:var(--text);margin-left:auto;}

.home-skills{padding:0 0 80px;}
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:50px;}
.skill-card{padding:28px 24px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--card-r);transition:all 0.3s;}
.skill-card:hover{transform:translateY(-4px);background:var(--glass-hover);border-color:rgba(255,255,255,0.14);}
.skill-icon{width:42px;height:42px;background:rgba(232,200,64,0.1);border:1px solid rgba(232,200,64,0.2);border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.skill-icon i{color:var(--gold);font-size:1.1rem;}
.skill-title{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:12px;color:var(--text);}
.skill-items{display:flex;flex-direction:column;gap:7px;}
.skill-item{font-size:0.86rem;color:var(--text2);display:flex;align-items:center;gap:8px;}
.skill-item::before{content:'';width:4px;height:4px;background:var(--gold2);border-radius:50%;flex-shrink:0;}

.projects-page{padding:80px 0;}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px;margin-top:50px;}
.project-card{padding:0;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;overflow:hidden;transition:all 0.3s;position:relative;}
.project-card:hover{transform:translateY(-6px);border-color:rgba(232,200,64,0.25);box-shadow:0 20px 60px rgba(0,0,0,0.4);}
.project-card-top{padding:28px 28px 20px;display:flex;align-items:flex-start;gap:16px;}
.project-logo{width:64px;height:64px;border-radius:14px;flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;overflow:hidden;}
.project-logo img{width:100%;height:100%;object-fit:cover;border-radius:14px;}
.project-info{flex:1;}
.project-name{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:6px;}
.project-type{font-size:0.75rem;color:var(--gold);font-family:'JetBrains Mono',monospace;padding:3px 10px;background:rgba(232,200,64,0.1);border:1px solid rgba(232,200,64,0.2);border-radius:50px;display:inline-block;}
.project-desc{padding:0 28px 28px;font-size:0.92rem;color:var(--text2);line-height:1.75;border-top:1px solid var(--glass-border);padding-top:18px;margin-top:4px;}
.project-footer{padding:16px 28px;background:rgba(0,0,0,0.15);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;}
.project-tag{font-size:0.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.project-role{font-size:0.78rem;color:var(--silver2);font-weight:600;}

.reviews-page{padding:80px 0;}
.reviews-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:50px;}
.review-card{padding:24px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--card-r);transition:all 0.3s;}
.review-card:hover{background:var(--glass-hover);border-color:rgba(255,255,255,0.14);}
.review-stars{display:flex;gap:3px;margin-bottom:14px;}
.review-stars i{color:var(--gold);font-size:0.9rem;}
.review-text{font-size:0.96rem;color:var(--text2);line-height:1.8;margin-bottom:18px;font-style:italic;}
.review-text::before{content:'"';color:var(--gold);font-size:1.4rem;font-family:'Outfit',sans-serif;line-height:0;position:relative;top:8px;margin-right:4px;}
.review-author{display:flex;align-items:center;gap:12px;}
.author-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.82rem;color:#1a1200;}
.author-name{font-weight:600;font-size:0.9rem;color:var(--text);}
.author-role{font-size:0.78rem;color:var(--text2);}

.payment-section{margin-top:70px;}
.payment-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:40px;}
.payment-card{padding:32px;background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;position:relative;overflow:hidden;transition:all 0.3s;}
.payment-card:hover{transform:translateY(-4px);border-color:rgba(232,200,64,0.25);}
.payment-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold2),var(--gold));}
.payment-icon-wrap{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:1.6rem;}
.payment-icon-wrap.cashapp{background:rgba(0,210,106,0.1);border:1px solid rgba(0,210,106,0.2);}
.payment-icon-wrap.bank{background:rgba(77,214,255,0.1);border:1px solid rgba(77,214,255,0.2);}
.payment-title{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:10px;}
.payment-desc{font-size:0.92rem;color:var(--text2);line-height:1.7;margin-bottom:24px;}
.payment-handle{display:flex;align-items:center;gap:10px;padding:14px 18px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.08);border-radius:12px;font-family:'JetBrains Mono',monospace;font-size:1rem;color:var(--text);}
.payment-handle i{color:var(--gold);}
.payment-note{margin-top:14px;font-size:0.8rem;color:var(--text2);display:flex;align-items:center;gap:6px;}
.payment-note i{color:var(--gold2);}
.hire-cta{margin-top:60px;padding:48px;background:linear-gradient(135deg,rgba(232,200,64,0.07),rgba(124,106,255,0.07));border:1px solid rgba(232,200,64,0.18);border-radius:24px;text-align:center;}
.hire-cta h3{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:900;margin-bottom:12px;}
.hire-cta p{font-size:1rem;color:var(--text2);margin-bottom:28px;max-width:480px;margin-left:auto;margin-right:auto;}

.about-page{padding:80px 0;}
.about-grid{display:grid;grid-template-columns:1fr 1.8fr;gap:80px;align-items:start;}
.about-sidebar{position:sticky;top:calc(var(--nav-h) + 20px);}
.avatar-box{width:100%;aspect-ratio:1;background:linear-gradient(135deg,rgba(124,106,255,0.15),rgba(232,200,64,0.08));border:1px solid rgba(232,200,64,0.18);border-radius:24px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative;overflow:hidden;}
.avatar-box::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent);}
.avatar-letter{font-family:'Outfit',sans-serif;font-size:6rem;font-weight:900;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;z-index:1;}
.about-story{display:flex;flex-direction:column;gap:40px;}
.story-block h2{font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.story-block h2 i{font-size:1.2rem;color:var(--gold);}
.story-block p{font-size:1rem;color:var(--text2);line-height:1.85;margin-bottom:12px;}
.story-block p:last-child{margin-bottom:0;}

.tools-wrap{padding:60px 0 80px;}
.tools-cloud{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:880px;margin:40px auto 0;}
.tool-chip{padding:9px 18px;background:var(--glass);border:1px solid var(--glass-border);border-radius:50px;font-size:0.84rem;color:var(--text2);font-family:'JetBrains Mono',monospace;transition:all 0.2s;cursor:default;}
.tool-chip:hover{background:rgba(232,200,64,0.07);border-color:rgba(232,200,64,0.2);color:var(--gold);}

footer{padding:40px 0;border-top:1px solid rgba(255,255,255,0.06);text-align:center;position:relative;z-index:1;}
.footer-links{display:flex;justify-content:center;gap:28px;margin-bottom:16px;}
.footer-links button{background:none;border:none;color:var(--text2);font-size:0.9rem;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;transition:color 0.2s;padding:4px;}
.footer-links button:hover{color:var(--gold);}
.footer-copy{font-size:0.88rem;color:var(--text3);}
.footer-heart{color:var(--gold);display:inline-block;animation:hb 1.5s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);margin:0;}

@media(max-width:900px){
.home-about-inner{grid-template-columns:1fr;gap:40px;}
.about-grid{grid-template-columns:1fr;gap:40px;}
.about-sidebar{position:static;}
.avatar-box{aspect-ratio:2/1;}
.skills-grid{grid-template-columns:1fr 1fr;}
.payment-grid{grid-template-columns:1fr;}
}
@media(max-width:680px){
.container{padding:0 20px;}
.nav-inner{padding:0 20px;}
.nav-links{display:none;}
.hamburger{display:flex;}
.hero-name{font-size:3.6rem;}
.stats-row{grid-template-columns:1fr;max-width:280px;}
.skills-grid{grid-template-columns:1fr;}
.projects-grid{grid-template-columns:1fr;}
.section-h{font-size:2rem;}
.hire-cta{padding:28px 20px;}
}

.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s,visibility 0.5s;}
.loading.out{opacity:0;visibility:hidden;}
.loading-word{font-family:'Outfit',sans-serif;font-size:3.5rem;font-weight:900;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:lp 2s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.7;transform:scale(1.04);}}
.loading-bar{width:160px;height:2px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-top:24px;}
.loading-bar::after{content:'';display:block;width:100%;height:100%;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:lb 1.4s ease-in-out infinite;}
@keyframes lb{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

.setups-section{padding:60px 0 0;}
.setups-intro{font-size:1.05rem;color:var(--text2);line-height:1.85;max-width:680px;margin-bottom:40px;}
.setups-types{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:40px;}

<div class="about-story">
<div class="story-block">
<h2><i class="fa-solid fa-person"></i> Introduction</h2>
<p>yo, im waffles,also known as ilykeelon. i manage and own Minecraft servers and networks, and i help people all around with their server needs. been at this for over 2 years and honestly its just gotten more fun as time goes on.</p>
<p>what started as just playing on servers eventually turned into owning them, and then managing them, and then helping other people run theirs. one thing led to another and now its basically what i do.</p>
</div>
<div class="story-block">
<h2><i class="fa-solid fa-network-wired"></i> What I Do as Network Manager</h2>
<p>running a Minecraft network means handling a lot of moving parts,proxy configuration, server interconnection, load balancing between game modes, keeping everything online and stable. i handle all of that.</p>
<p>whether its setting up Velocity or BungeeCord proxies, configuring game server connections, managing player routing between servers, or troubleshooting why something isnt communicating properly,that falls under my wheelhouse.</p>
<p>i also deal with network-level plugin management: making sure the right plugins are on the right servers, that they dont conflict with each other, and that performance stays solid across the whole network.</p>
</div>
<div class="story-block">
<h2><i class="fa-solid fa-gears"></i> Systems & Plugin Configuration</h2>
<p>my main specialty is plugin configuration. ive worked with dozens of different plugins across all categories,economy, combat, building, events, chat, permissions, and more. i know how to get them working together properly and optimized for your specific server type.</p>
<p>configuration is an underrated skill. anyone can install a plugin. actually making it work the way your server needs, not conflicting with anything else, and running efficiently,thats where the real work is.</p>
<p>i also write custom Skript code when plugins dont do exactly what you need. sometimes you need a specific mechanic that doesnt exist as a plugin,thats where scripting fills the gap.</p>
</div>
<div class="story-block">
<h2><i class="fa-solid fa-code"></i> Development Side</h2>
<p>on the code side, Skript is my main language for Minecraft-specific work. its built for it and when you know it well, you can build pretty much any gameplay mechanic you need. ive made everything from simple chat formatting scripts to full event systems with custom bosses, rewards, and countdowns.</p>
<p>i also know HTML for web stuff, and im learning Java,slowly but getting there. Java opens up proper plugin development and thats where i want to take things further down the line.</p>
</div>
</div>

const navLinks={home:'nl-home',about:'nl-about',projects:'nl-projects',reviews:'nl-reviews'};

}
